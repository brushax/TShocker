name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release versions
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(node -p "require('fs').readFileSync('./src-tauri/Cargo.toml','utf8').match(/^version\\s*=\\s*\"([^\"]+)\"/m)[1]")

          echo "Tag version:     ${TAG_VERSION}"
          echo "package.json:    ${PACKAGE_VERSION}"
          echo "tauri.conf.json: ${TAURI_VERSION}"
          echo "Cargo.toml:      ${CARGO_VERSION}"

          [[ "${TAG_VERSION}" == "${PACKAGE_VERSION}" ]]
          [[ "${TAG_VERSION}" == "${TAURI_VERSION}" ]]
          [[ "${TAG_VERSION}" == "${CARGO_VERSION}" ]]

      - name: Run tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TShocker ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeDebug: false
          includeUpdaterJson: false
          generateReleaseNotes: true
